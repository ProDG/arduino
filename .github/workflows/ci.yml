name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Opt every action into Node.js 24 now — actions/checkout@v4 and
# pnpm/action-setup@v4 still ship their JS on Node 20, which GitHub
# deprecated 2025-09-19. June 2026 is the cutoff. Setting this here
# keeps the deprecation warning silent and is forward-safe.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks needs full history to scan the diff.
          fetch-depth: 0

      # No `version:` here — `packageManager: pnpm@10.x.y` in
      # package.json is the single source of truth, and pnpm/action-setup
      # errors when both are specified (ERR_PNPM_BAD_PM_VERSION).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm lint:verify-rule
      - run: pnpm test --run
      - run: pnpm build

      - name: gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
