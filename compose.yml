services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [arduino]

  wagtail:
    build:
      context: ./backend
      target: ${BUILD_TARGET:-prod}
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks: [arduino]
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.wagtail.rule=Host(`arduino.localhost`) && (PathPrefix(`/admin`) || PathPrefix(`/api`) || PathPrefix(`/preview-data`) || PathPrefix(`/django-static`) || PathPrefix(`/django-admin`) || PathPrefix(`/documents`))'
      - 'traefik.http.routers.wagtail.entrypoints=web'
      - 'traefik.http.routers.wagtail.priority=100'
      - 'traefik.http.services.wagtail.loadbalancer.server.port=8000'

  traefik:
    image: traefik:v3.2
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --api.insecure=true
    ports:
      - '80:80'
      - '8080:8080'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks: [arduino]

  # Reverse-proxies arduino.localhost FE traffic to the host's Angular dev server
  # (pnpm start on :4200). FE is NOT containerized in dev — caddy is just the
  # bridge between Docker's network and the host process. Catch-all priority=1
  # so wagtail (PathPrefix /admin /api /preview-data ...) and minio (/media)
  # take precedence at priority>=90.
  #
  # In dev: ensure `pnpm start` is running on the host. Without it, this
  # container will return 502 on every request.
  fe-router:
    image: caddy:2-alpine
    networks: [arduino]
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    command:
      - caddy
      - reverse-proxy
      - --from
      - :80
      - --to
      - host.docker.internal:4200
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.fe.rule=Host(`arduino.localhost`)'
      - 'traefik.http.routers.fe.entrypoints=web'
      - 'traefik.http.routers.fe.priority=1'
      - 'traefik.http.services.fe.loadbalancer.server.port=80'

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [arduino]
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.minio.rule=Host(`arduino.localhost`) && PathPrefix(`/media`)'
      - 'traefik.http.routers.minio.entrypoints=web'
      - 'traefik.http.routers.minio.priority=90'
      - 'traefik.http.services.minio.loadbalancer.server.port=9000'
      - 'traefik.http.middlewares.media-stripprefix.stripprefix.prefixes=/media'
      - 'traefik.http.routers.minio.middlewares=media-stripprefix'

  mc:
    image: minio/mc:RELEASE.2025-04-08T15-39-49Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks: [arduino]
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing local/arduino-media
        mc anonymous set download local/arduino-media/images
        echo "MinIO bootstrap complete: arduino-media bucket; public-read on images/ only."
    restart: 'no'

networks:
  arduino:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
